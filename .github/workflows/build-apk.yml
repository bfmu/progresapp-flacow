name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'packages/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: build-apk
  cancel-in-progress: false

jobs:
  build:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (EAS Cloud)
        working-directory: mobile
        run: |
          BUILD_URL=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json 2>/dev/null | jq -r '.[0].artifacts.buildUrl // empty')

          if [ -z "$BUILD_URL" ]; then
            echo "::error::No build URL returned from EAS"
            exit 1
          fi

          echo "Downloading APK from EAS..."
          curl -fL "$BUILD_URL" -o "${{ github.workspace }}/flacow.apk"
          echo "APK ready — $(du -h "${{ github.workspace }}/flacow.apk" | cut -f1)"

      - name: Deploy APK to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p ~/docker/github/progresapp-flacow/downloads

      - name: Upload APK to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: flacow.apk
          target: ~/docker/github/progresapp-flacow/downloads/
