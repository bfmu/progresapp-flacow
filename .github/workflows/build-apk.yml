name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'packages/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: build-apk
  cancel-in-progress: false

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_BASE_URL: https://flacow.bfmu.dev/api
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: 198417734095-7lo4l5oqv09ksrufeo5leteo8u803c8t.apps.googleusercontent.com
        run: npx expo prebuild --platform android --clean --no-install

      - name: Pin Gradle to 8.6 (RN 0.74 tested version; expo prebuild emits 8.8)
        run: |
          sed -i 's/gradle-8\.8-all/gradle-8.6-all/g' mobile/android/gradle/wrapper/gradle-wrapper.properties
          grep distributionUrl mobile/android/gradle/wrapper/gradle-wrapper.properties

      - name: Build debug APK
        working-directory: mobile/android
        env:
          EXPO_PUBLIC_API_BASE_URL: https://flacow.bfmu.dev/api
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: 198417734095-7lo4l5oqv09ksrufeo5leteo8u803c8t.apps.googleusercontent.com
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Prepare APK for upload
        run: |
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk flacow.apk
          echo "APK size: $(du -h flacow.apk | cut -f1)"

      - name: Upload APK to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" \
            "mkdir -p ~/docker/github/progresapp-flacow/downloads"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            flacow.apk \
            "$SSH_USER@$SSH_HOST:~/docker/github/progresapp-flacow/downloads/flacow.apk"
          rm /tmp/deploy_key
