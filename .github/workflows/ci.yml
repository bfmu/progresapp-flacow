name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: 'false'

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  shared:
    name: Shared package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (workspaces)
        run: npm ci

      - name: Test
        run: cd packages/shared && npm test -- --watchAll=false

  frontend:
    name: Frontend (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (workspaces)
        run: npm ci
        working-directory: .

      - name: Astro sync
        run: npx astro sync

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          PUBLIC_API_BASE_URL: http://localhost:3000/api
