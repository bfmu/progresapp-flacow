server {
    listen 80;

    # Serve APK and static downloads directly from nginx
    location /downloads/ {
        alias /var/www/downloads/;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control 'no-cache';
    }

    # Proxy para las solicitudes a /api
    location /api/ {
        proxy_pass http://flacow-backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para todas las demás solicitudes al frontend
    location / {
        proxy_pass http://flacow-frontend:4321/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
